// 学习状态管理
const STORAGE_KEYS = {
    LEARNED: 'word_learned',
    FAVORITES: 'word_favorites',
    REVIEW: 'word_review',
    STATS: 'word_stats',
    STREAK: 'word_streak',
    HISTORY: 'word_history',
    HISTORY_ERRORS: 'word_history_errors'
};

function getStoredData(key, defaultValue = []) {
    try {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : defaultValue;
    } catch {
        return defaultValue;
    }
}

function setStoredData(key, data) {
    try {
        localStorage.setItem(key, JSON.stringify(data));
    } catch (e) {
        console.error('存储失败:', e);
    }
}

let currentIndex = 0;
let currentMode = 'card';
let filteredWords = shuffleArray([...wordsData]);
let reviewWords = [];
let recentWords = [];
let historyWords = [];
let historyErrors = {};
let isRereadMode = false;
let rereadIndex = 0;

function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function loadHistoryData() {
    historyWords = getStoredData(STORAGE_KEYS.HISTORY, []);
    historyErrors = getStoredData(STORAGE_KEYS.HISTORY_ERRORS, {});
}

function updateStats() {
    const learned = getStoredData(STORAGE_KEYS.LEARNED);
    learnedCount.textContent = learned.length;
    totalCount.textContent = wordsData.length;
}

function updateReviewBadge() {
    const reviewBadge = document.getElementById('review-badge');
    if (reviewBadge) {
        const review = getStoredData(STORAGE_KEYS.REVIEW);
        reviewBadge.textContent = review.length;
        reviewBadge.style.display = review.length > 0 ? 'block' : 'none';
    }
}

function updateHistoryBadge() {
    const rereadCount = Object.keys(historyErrors).filter(w => historyErrors[w] < 2).length;
    const historyBadge = document.getElementById('history-badge');
    if (historyBadge) {
        historyBadge.textContent = rereadCount;
        historyBadge.style.display = rereadCount > 0 ? 'block' : 'none';
    }
    const rereadBtn = document.getElementById('start-reread-btn');
    if (rereadBtn) {
        rereadBtn.style.display = rereadCount > 0 ? 'flex' : 'none';
    }
}

function renderHistoryList() {
    const historyList = document.getElementById('history-list');
    const historyEmpty = document.getElementById('history-empty');
    const historyTotal = document.getElementById('history-total');
    const historyReread = document.getElementById('history-reread');
    
    if (historyWords.length === 0) {
        historyEmpty.style.display = 'flex';
        historyList.innerHTML = '';
        historyTotal.textContent = '0';
        historyReread.textContent = '0';
        return;
    }
    
    historyEmpty.style.display = 'none';
    historyTotal.textContent = historyWords.length;
    
    const rereadCount = Object.keys(historyErrors).filter(w => historyErrors[w] < 2).length;
    historyReread.textContent = rereadCount;
    
    const uniqueWords = [...new Set(historyWords)];
    historyList.innerHTML = uniqueWords.map(wordStr => {
        const word = wordsData.find(w => w.word === wordStr);
        if (!word) return '';
        
        const errors = historyErrors[wordStr] || 0;
        let statusHtml = '';
        if (errors >= 2) {
            statusHtml = '<span class="status-tag returned">已回归</span>';
        } else if (errors === 1) {
            statusHtml = '<span class="status-tag unknown">待复习</span>';
        } else {
            statusHtml = '<span class="status-tag known">已掌握</span>';
        }
        
        return `
            <div class="history-word-item">
                <div class="history-word-info">
                    <div class="history-word-name">${word.word}</div>
                    <div class="history-word-meaning">${word.meaning}</div>
                </div>
                <div class="history-word-status">
                    ${statusHtml}
                </div>
            </div>
        `;
    }).join('');
}

function addToHistory(word) {
    if (!historyWords.includes(word.word)) {
        historyWords.push(word.word);
        setStoredData(STORAGE_KEYS.HISTORY, historyWords);
    }
}

function loadCurrentWord() {
    if (filteredWords.length === 0) return;
    
    const word = filteredWords[currentIndex];
    currentWordEl.textContent = word.word;
    wordPhoneticEl.textContent = word.phonetic;
    wordMeaningEl.textContent = word.meaning;
    wordExampleEl.textContent = word.example;
    
    const favorites = getStoredData(STORAGE_KEYS.FAVORITES);
    const isFavorited = favorites.includes(word.word);
    favoriteBtn.classList.toggle('active', isFavorited);
    
    wordCard.classList.remove('flipped');
    
    progressCurrent.textContent = currentIndex + 1;
    progressTotal.textContent = filteredWords.length;
    progressFill.style.width = `${((currentIndex + 1) / filteredWords.length) * 100}%`;
}

function flipCard() {
    wordCard.classList.toggle('flipped');
}

function pronounceWord() {
    const word = filteredWords[currentIndex].word;
    if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
    }
}

function markAsKnown() {
    const word = filteredWords[currentIndex];
    const learned = getStoredData(STORAGE_KEYS.LEARNED);
    if (!learned.includes(word.word)) {
        learned.push(word.word);
        setStoredData(STORAGE_KEYS.LEARNED, learned);
        updateStats();
        updateDailyStats(1, 0);
    }
    if (isRereadMode) {
        if (historyErrors[word.word] !== undefined) {
            delete historyErrors[word.word];
            setStoredData(STORAGE_KEYS.HISTORY_ERRORS, historyErrors);
            updateHistoryBadge();
            renderHistoryList();
        }
        nextRereadWord();
    } else {
        addToHistory(word);
        addToRecentWords(word);
        nextWord();
    }
}

function markAsUnknown() {
    const word = filteredWords[currentIndex];
    const review = getStoredData(STORAGE_KEYS.REVIEW);
    if (!review.includes(word.word)) {
        review.push(word.word);
        setStoredData(STORAGE_KEYS.REVIEW, review);
        updateReviewBadge();
    }
    
    if (isRereadMode) {
        historyErrors[word.word] = (historyErrors[word.word] || 0) + 1;
        setStoredData(STORAGE_KEYS.HISTORY_ERRORS, historyErrors);
        updateHistoryBadge();
        renderHistoryList();
        
        if (historyErrors[word.word] >= 2) {
            returnToPendingList(word);
        }
        nextRereadWord();
    } else {
        addToHistory(word);
        addToRecentWords(word);
        nextWord();
    }
}

function returnToPendingList(word) {
    const learned = getStoredData(STORAGE_KEYS.LEARNED);
    const idx = learned.indexOf(word.word);
    if (idx > -1) {
        learned.splice(idx, 1);
        setStoredData(STORAGE_KEYS.LEARNED, learned);
        updateStats();
    }
    
    filteredWords = shuffleArray([word, ...filteredWords]);
    currentIndex = 0;
    loadCurrentWord();
}

function nextRereadWord() {
    const pendingWords = Object.keys(historyErrors).filter(w => historyErrors[w] < 2);
    
    if (pendingWords.length === 0) {
        isRereadMode = false;
        rereadIndex = 0;
        alert('🎉 二次学习完成！所有单词已掌握！');
        switchMode('history');
        return;
    }
    
    rereadIndex++;
    if (rereadIndex >= pendingWords.length) {
        rereadIndex = 0;
    }
    
    const nextWord = pendingWords[rereadIndex];
    const wordData = wordsData.find(w => w.word === nextWord);
    
    if (wordData) {
        currentWordEl.textContent = wordData.word;
        wordPhoneticEl.textContent = wordData.phonetic;
        wordMeaningEl.textContent = wordData.meaning;
        wordExampleEl.textContent = wordData.example;
        wordCard.classList.remove('flipped');
    }
}

function startRereadMode() {
    const pendingWords = Object.keys(historyErrors).filter(w => historyErrors[w] < 2);
    
    if (pendingWords.length === 0) {
        alert('暂无需要二次学习的单词！');
        return;
    }
    
    isRereadMode = true;
    rereadIndex = 0;
    currentMode = 'card';
    
    document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active'));
    document.getElementById('card-mode').classList.add('active');
    
    const nextWord = pendingWords[0];
    const wordData = wordsData.find(w => w.word === nextWord);
    
    if (wordData) {
        currentWordEl.textContent = wordData.word;
        wordPhoneticEl.textContent = wordData.phonetic;
        wordMeaningEl.textContent = wordData.meaning;
        wordExampleEl.textContent = wordData.example;
        wordCard.classList.remove('flipped');
    }
}

function generateEssay(words) {
    const shortTemplates = [
        {
            sentence: "To {verb1} success, we must {verb2} hard and {verb3} our goals daily. A positive {noun1} helps us {verb4} challenges and {verb5} our full potential.",
            translation: "要取得成功，我们必须努力奋斗并每天追求目标。积极的态度帮助我们克服挑战并发挥全部潜能。"
        },
        {
            sentence: "College life teaches us to {verb1} knowledge, {verb2} new friends, and {verb3} our horizons. These {noun1} {verb4} our growth and {verb5} our future.",
            translation: "大学生活教会我们获取知识、结交新朋友并开阔视野。这些经历促进我们的成长并塑造我们的未来。"
        },
        {
            sentence: "Technology continues to {verb1} our world, {verb2} communication and {verb3} productivity. We must {verb4} wisely to {verb5} its benefits.",
            translation: "科技持续改变我们的世界，改善沟通并提高生产力。我们必须明智地使用以充分发挥其益处。"
        },
        {
            sentence: "Good habits {verb1} our daily lives, helping us {verb2} time well and {verb3} healthy. A balanced {noun1} can {verb4} happiness and {verb5} success.",
            translation: "良好的习惯塑造我们的日常生活，帮助我们合理利用时间并保持健康。平衡的生活方式能带来幸福并促进成功。"
        },
        {
            sentence: "Teamwork lets us {verb1} ideas, {verb2} problems together, and {verb3} better results. Trust and {noun1} {verb4} strong relationships that {verb5} achievement.",
            translation: "团队合作让我们分享想法、共同解决问题并获得更好的结果。信任与沟通建立起促进成就的牢固关系。"
        }
    ];

    const verbs = words.filter(w => w.meaning.includes('v.')).map(w => w);
    const nouns = words.filter(w => w.meaning.includes('n.')).map(w => w);
    
    const template = shortTemplates[Math.floor(Math.random() * shortTemplates.length)];
    
    let sentence = template.sentence;
    const usedWords = [];
    
    let verbIndex = 0;
    sentence = sentence.replace(/{verb(\d+)}/g, () => {
        const wordObj = verbs[verbIndex % verbs.length];
        usedWords.push(wordObj);
        verbIndex++;
        return `__WORD__${wordObj.word}__ENDWORD__`;
    });
    
    let nounIndex = 0;
    sentence = sentence.replace(/{noun(\d+)}/g, () => {
        const wordObj = nouns.length > 0 ? nouns[nounIndex % nouns.length] : verbs[0];
        if (!usedWords.includes(wordObj)) usedWords.push(wordObj);
        nounIndex++;
        return `__WORD__${wordObj.word}__ENDWORD__`;
    });
    
    const remainingWords = words.filter(w => !usedWords.find(uw => uw.word === w.word));
    if (usedWords.length < 10 && remainingWords.length > 0) {
        const additionalWords = remainingWords.slice(0, 10 - usedWords.length);
        usedWords.push(...additionalWords);
        const extraWords = additionalWords.map(w => w.word).join(', ');
        sentence += ` Remember words like: ${extraWords}`;
    }
    
    return {
        sentence: sentence,
        translation: template.translation,
        usedWords: usedWords.slice(0, 10)
    };
}

function analyzeSentence(sentence) {
    const analysis = [];
    const sentences = sentence.replace(/[.!?]+/g, '.').split('.').filter(s => s.trim());
    
    sentences.forEach((sent, idx) => {
        sent = sent.trim();
        if (!sent) return;
        
        const parts = [];
        const words = sent.split(' ');
        
        let subject = '';
        let subjectType = '';
        const subjCandidates = ['I', 'We', 'You', 'They', 'He', 'She', 'It', 'This', 'That', 'These', 'Those'];
        if (subjCandidates.includes(words[0])) {
            subject = words[0];
            subjectType = '代词主语';
        } else if (words.length > 1 && !['To', 'In', 'On', 'For', 'With', 'By'].includes(words[0])) {
            subject = words[0];
            subjectType = '名词主语';
        }
        
        if (subject) {
            parts.push({ part: '主语', content: subject, type: subjectType });
        }
        
        const verbs = words.filter(w => {
            const verbEndings = ['s', 'ed', 'ing'];
            return verbEndings.some(e => w.endsWith(e)) || 
                   ['be', 'have', 'do', 'can', 'will', 'must', 'should', 'may'].includes(w.toLowerCase());
        });
        
        if (verbs.length > 0) {
            parts.push({ part: '谓语', content: verbs.join(' '), type: '动词短语' });
        }
        
        const objStart = verbs.length > 0 ? words.indexOf(verbs[0]) + 1 : 1;
        const objects = words.slice(objStart).filter(w => !['to', 'and', 'or', 'but', 'for', 'with', 'by', 'in', 'on', 'at'].includes(w.toLowerCase()));
        if (objects.length > 0) {
            parts.push({ part: '宾语', content: objects.join(' '), type: '名词短语' });
        }
        
        const adverbs = words.filter(w => w.endsWith('ly') || ['quickly', 'slowly', 'carefully', 'well', 'hard', 'daily', 'together'].includes(w.toLowerCase()));
        if (adverbs.length > 0) {
            parts.push({ part: '状语', content: adverbs.join(' '), type: '副词短语' });
        }
        
        analysis.push({
            sentence: sent + '.',
            parts: parts.length > 0 ? parts : [{ part: '完整句', content: sent + '.', type: '简单句' }]
        });
    });
    
    return analysis;
}

let isResizing = false;
let resizeSide = '';

function startResize(event, side) {
    isResizing = true;
    resizeSide = side;
    document.addEventListener('mousemove', onResize);
    document.addEventListener('mouseup', stopResize);
    event.preventDefault();
}

function onResize(event) {
    if (!isResizing) return;
    
    const modal = document.querySelector('.resizable-modal');
    if (!modal) return;
    
    const overlay = modal.parentElement;
    const overlayRect = overlay.getBoundingClientRect();
    const modalRect = modal.getBoundingClientRect();
    
    let newWidth = modalRect.width;
    const minWidth = 300;
    const maxWidth = overlayRect.width - 40;
    
    if (resizeSide === 'left') {
        const deltaX = event.clientX - overlayRect.left;
        const newLeft = deltaX;
        const availableSpace = overlayRect.width - newLeft - 20;
        
        if (availableSpace >= minWidth && availableSpace <= maxWidth) {
            newWidth = availableSpace;
            modal.style.left = newLeft + 'px';
        }
    } else {
        const deltaX = event.clientX - modalRect.left;
        newWidth = Math.max(minWidth, Math.min(maxWidth, deltaX));
    }
    
    modal.style.width = newWidth + 'px';
}

function stopResize() {
    isResizing = false;
    resizeSide = '';
    document.removeEventListener('mousemove', onResize);
    document.removeEventListener('mouseup', stopResize);
}

function continueLearning() {

    const shuffledRemaining = shuffleArray(remainingWords);
    filteredWords = [...filteredWords.slice(0, currentIndex + 1), ...shuffledRemaining];
}

function toggleFavorite() {
    const word = filteredWords[currentIndex].word;
    const favorites = getStoredData(STORAGE_KEYS.FAVORITES);
    const index = favorites.indexOf(word);
    
    if (index > -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push(word);
    }
    
    setStoredData(STORAGE_KEYS.FAVORITES, favorites);
    favoriteBtn.classList.toggle('active');
    renderFavoriteList();
}

function nextWord() {
    if (currentIndex < filteredWords.length - 1) {
        currentIndex++;
        loadCurrentWord();
    } else {
        alert('🎉 太棒了！本轮学习完成！');
        currentIndex = 0;
        filteredWords = shuffleArray([...wordsData]);
        loadCurrentWord();
    }
}

function updateDailyStats(learned = 0, reviewed = 0) {
    const today = new Date().toDateString();
    const stats = getStoredData(STORAGE_KEYS.STATS, {});
    
    if (!stats[today]) {
        stats[today] = { learned: 0, reviewed: 0 };
    }
    
    stats[today].learned += learned;
    stats[today].reviewed += reviewed;
    setStoredData(STORAGE_KEYS.STATS, stats);
    updateStreak();
}

function updateStreak() {
    const today = new Date();
    let streak = 0;
    let checkDate = new Date(today);
    
    while (true) {
        const dateStr = checkDate.toDateString();
        const stats = getStoredData(STORAGE_KEYS.STATS, {});
        
        if (stats[dateStr] && stats[dateStr].learned > 0) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
        } else {
            break;
        }
    }
    
    setStoredData(STORAGE_KEYS.STREAK, streak);
}

function openReview() {
    if (!reviewEmpty || !reviewContent || !reviewCurrent || !reviewTotal) return;
    
    reviewWords = getStoredData(STORAGE_KEYS.REVIEW);
    
    if (reviewWords.length === 0) {
        reviewEmpty.style.display = 'block';
        reviewContent.style.display = 'none';
        return;
    }
    
    reviewEmpty.style.display = 'none';
    reviewContent.style.display = 'block';
    reviewCurrent.textContent = 1;
    reviewTotal.textContent = reviewWords.length;
    
    loadReviewWord();
}

function loadReviewWord() {
    if (!reviewCurrent || !reviewPrompt || !reviewWord || !reviewInput || !reviewResult) return;
    
    const wordIndex = parseInt(reviewCurrent.textContent) - 1;
    const word = wordsData.find(w => w.word === reviewWords[wordIndex]);
    if (word) {
        if (reviewMode === 'en-cn') {
            reviewPrompt.textContent = '请输入中文意思：';
            reviewWord.textContent = word.word;
            reviewInput.placeholder = '输入中文意思...';
        } else {
            reviewPrompt.textContent = '请输入英文单词：';
            const meaningPart = word.meaning.split('.').slice(1).join('.').trim();
            reviewWord.textContent = meaningPart || word.meaning;
            reviewInput.placeholder = '输入英文单词...';
        }
        reviewInput.value = '';
        reviewResult.style.display = 'none';
        reviewInput.focus();
    }
}

function submitReview() {
    if (!reviewInput || !reviewCurrent || !reviewResult || !reviewEmpty || !reviewContent) return;
    
    const userInput = reviewInput.value.trim();
    const wordIndex = parseInt(reviewCurrent.textContent) - 1;
    const word = wordsData.find(w => w.word === reviewWords[wordIndex]);
    
    if (!word) return;
    
    let isCorrect = false;
    let correctAnswer = '';
    
    if (reviewMode === 'en-cn') {
        const meaning = word.meaning.replace(/[v\.n\.adj\.adv\.prep\.conj\.pron\.]/g, '').trim();
        if (userInput.includes(meaning.slice(0, 2)) || meaning.includes(userInput)) {
            isCorrect = true;
        }
        correctAnswer = word.meaning;
    } else {
        if (userInput.toLowerCase() === word.word.toLowerCase()) {
            isCorrect = true;
        }
        correctAnswer = word.word;
    }
    
    if (isCorrect) {
        reviewResult.textContent = `✓ 正确！${correctAnswer}`;
        reviewResult.className = 'review-result correct';
        
        const review = getStoredData(STORAGE_KEYS.REVIEW);
        review.splice(wordIndex, 1);
        setStoredData(STORAGE_KEYS.REVIEW, review);
        reviewWords.splice(wordIndex, 1);
        
        updateDailyStats(0, 1);
    } else {
        reviewResult.textContent = `✗ 错误！正确答案：${correctAnswer}`;
        reviewResult.className = 'review-result wrong';
    }
    
    reviewResult.style.display = 'block';
    
    setTimeout(() => {
        if (reviewWords.length === 0) {
            reviewEmpty.style.display = 'block';
            reviewContent.style.display = 'none';
            updateReviewBadge();
            alert('🎉 复习完成！');
        } else {
            reviewCurrent.textContent = Math.min(parseInt(reviewCurrent.textContent) + 1, reviewWords.length);
            loadReviewWord();
        }
    }, 1500);
}

function showReviewHint() {
    if (!reviewCurrent || !reviewResult) return;
    
    const wordIndex = parseInt(reviewCurrent.textContent) - 1;
    const word = wordsData.find(w => w.word === reviewWords[wordIndex]);
    if (word) {
        let hint = '';
        if (reviewMode === 'en-cn') {
            hint = `💡 提示：${word.meaning.slice(0, 4)}...`;
        } else {
            hint = `💡 提示：${word.word.slice(0, 2)}...`;
        }
        reviewResult.textContent = hint;
        reviewResult.className = 'review-result';
        reviewResult.style.display = 'block';
    }
}

        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (btn.dataset.nav === 'stats') {
                openStats();
            } else if (btn.dataset.nav === 'history') {
                switchMode('history');
                openReview();
            } else if (btn.dataset.nav === 'park') {
                switchMode('park');
            }
        });
    });
    
    const startRereadBtn = document.getElementById('start-reread-btn');
    if (startRereadBtn) {
        startRereadBtn.addEventListener('click', startRereadMode);
    }
    
    wordCard.addEventListener('click', flipCard);
    pronounceBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        pronounceWord();
    });
    knowBtn.addEventListener('click', markAsKnown);
    unknownBtn.addEventListener('click', markAsUnknown);
    favoriteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFavorite();
    });
    
    searchInput.addEventListener('input', (e) => searchWords(e.target.value));
    
    wordList.addEventListener('click', handleListClick);
    favoriteList.addEventListener('click', handleListClick);
    
    const modalClose = document.getElementById('modal-close');
    if (modalClose) {
        modalClose.addEventListener('click', () => {
            statsModal.classList.remove('show');
        });
    }
    
    const reviewSubmit = document.getElementById('review-submit');
    if (reviewSubmit) {
        reviewSubmit.addEventListener('click', submitReview);
    }
    
    const reviewHint = document.getElementById('review-hint');
    if (reviewHint) {
        reviewHint.addEventListener('click', showReviewHint);
    }
    
    const modeEnCn = document.getElementById('mode-en-cn');
    const modeCnEn = document.getElementById('mode-cn-en');
    if (modeEnCn) {
        modeEnCn.addEventListener('click', () => {
            reviewMode = 'en-cn';
            modeEnCn.classList.add('active');
            if (modeCnEn) {
                modeCnEn.classList.remove('active');
            }
            loadReviewWord();
        });
    }
    if (modeCnEn) {
        modeCnEn.addEventListener('click', () => {
            reviewMode = 'cn-en';
            modeCnEn.classList.add('active');
            if (modeEnCn) {
                modeEnCn.classList.remove('active');
            }
            loadReviewWord();
        });
    }
    
    const startGameBtn = document.getElementById('start-game-btn');
    const restartGameBtn = document.getElementById('restart-game-btn');
    if (startGameBtn) {
        startGameBtn.addEventListener('click', startMatchingGame);
    }
    if (restartGameBtn) {
        restartGameBtn.addEventListener('click', startMatchingGame);
    }
    
    if (reviewInput) {
        reviewInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitReview();
        });
    }
    
    const resetBtn = document.getElementById('reset-btn');
    if (resetBtn) {
        resetBtn.addEventListener('click', resetAllData);
    }
    
    statsModal.addEventListener('click', (e) => {
        if (e.target === statsModal) statsModal.classList.remove('show');
    });
}

function handleListClick(e) {
    const target = e.target.closest('button');
    if (!target) return;
    
    const word = target.dataset.word;
    
    if (target.classList.contains('word-favorite-btn')) {
        const favorites = getStoredData(STORAGE_KEYS.FAVORITES);
        const index = favorites.indexOf(word);
        
        if (index > -1) {
            favorites.splice(index, 1);
            target.classList.remove('favorited');
        } else {
            favorites.push(word);
            target.classList.add('favorited');
        }
        
        setStoredData(STORAGE_KEYS.FAVORITES, favorites);
        updateStats();
    } else if (target.classList.contains('word-pronounce-btn')) {
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }
    }
}

let gameWords = [];
let selectedEnglish = null;
let selectedChinese = null;
let matchedCount = 0;
let gameTimer = null;
let gameStartTime = 0;

function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function startMatchingGame() {
    const learnedWordKeys = getStoredData(STORAGE_KEYS.LEARNED);
    if (learnedWordKeys.length < 6) {
        alert('请先学习至少6个单词后再玩游戏！');
        return;
    }
    
    const learnedWords = wordsData.filter(w => learnedWordKeys.includes(w.word));
    
    gameWords = shuffleArray(learnedWords).slice(0, 6);
    
    const englishColumn = document.getElementById('english-column');
    const chineseColumn = document.getElementById('chinese-column');
    const gameEmpty = document.getElementById('game-empty');
    const matchingArea = document.getElementById('matching-area');
    const gameResult = document.getElementById('game-result');
    const startGameBtn = document.getElementById('start-game-btn');
    const restartGameBtn = document.getElementById('restart-game-btn');
    
    gameEmpty.style.display = 'none';
    gameResult.style.display = 'none';
    matchingArea.style.display = 'flex';
    startGameBtn.style.display = 'none';
    restartGameBtn.style.display = 'flex';
    
    const shuffledChinese = shuffleArray(gameWords.map(w => ({ word: w.word, meaning: w.meaning })));
    
    englishColumn.innerHTML = '';
    chineseColumn.innerHTML = '';
    
    gameWords.forEach((w, i) => {
        const item = document.createElement('div');
        item.className = 'match-item english';
        item.textContent = w.word;
        item.dataset.word = w.word;
        item.dataset.type = 'english';
        item.addEventListener('click', () => selectItem(item, 'english', w.word));
        englishColumn.appendChild(item);
    });
    
    shuffledChinese.forEach((w, i) => {
        const item = document.createElement('div');
        item.className = 'match-item chinese';
        item.textContent = w.meaning.split(',')[0].split(';')[0].trim();
        item.dataset.word = w.word;
        item.dataset.meaning = w.meaning;
        item.dataset.type = 'chinese';
        item.addEventListener('click', () => selectItem(item, 'chinese', w.word));
        chineseColumn.appendChild(item);
    });
    
    selectedEnglish = null;
    selectedChinese = null;
    matchedCount = 0;
    gameStartTime = Date.now();
    
    if (gameTimer) clearInterval(gameTimer);
    gameTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
        document.getElementById('game-time').textContent = elapsed;
    }, 1000);
}

function selectItem(item, type, word) {
    if (item.classList.contains('matched')) return;
    
    if (type === 'english') {
        if (selectedEnglish) {
            selectedEnglish.classList.remove('selected');
        }
        selectedEnglish = item;
        selectedEnglish.classList.add('selected');
    } else {
        if (selectedChinese) {
            selectedChinese.classList.remove('selected');
        }
        selectedChinese = item;
        selectedChinese.classList.add('selected');
    }
    
    if (selectedEnglish && selectedChinese) {
        checkMatch();
    }
}

function checkMatch() {
    const englishWord = selectedEnglish.dataset.word;
    const chineseWord = selectedChinese.dataset.word;
    
    if (englishWord === chineseWord) {
        selectedEnglish.classList.remove('selected');
        selectedChinese.classList.remove('selected');
        selectedEnglish.classList.add('matched');
        selectedChinese.classList.add('matched');
        selectedEnglish = null;
        selectedChinese = null;
        matchedCount++;
        
        if (matchedCount === 6) {
            gameWin();
        }
    } else {
        selectedEnglish.classList.add('wrong');
        selectedChinese.classList.add('wrong');
        
        setTimeout(() => {
            selectedEnglish.classList.remove('wrong', 'selected');
            selectedChinese.classList.remove('wrong', 'selected');
            selectedEnglish = null;
            selectedChinese = null;
        }, 500);
    }
}

function gameWin() {
    clearInterval(gameTimer);
    const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
    
    const matchingArea = document.getElementById('matching-area');
    const gameResult = document.getElementById('game-result');
    
    matchingArea.style.display = 'none';
    gameResult.style.display = 'block';
    document.getElementById('game-time').textContent = elapsed;
}

document.addEventListener('DOMContentLoaded', init);
